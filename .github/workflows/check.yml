name: Check
on:
  push:
    branches:
      - main
  pull_request:

# Default to 'contents: read', which grants actions to read commits.
#
# see https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  #
  # Linter checker
  #
  linters:
    name: Linters (${{ matrix.go-version || 'minimum' }})
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    strategy:
      matrix:
        go-version:
          - "" # empty; fall back on go-version-file (use go.mod); see https://github.com/actions/setup-go/issues/450#issuecomment-3620402646
          - 1.26
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          go-version-file: "go.mod" # used when go-version is not specified.
          check-latest: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          skip-cache: true
          args: --timeout=5m

  #
  # Project checker
  #
  # based on https://github.com/containerd/project-checks/blob/main/action.yml
  project:
    name: Project Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          path: src/github.com/containerd/accelerated-container-image
          fetch-depth: 100
          persist-credentials: false

      - name: set env
        shell: bash
        run: |
          echo "GOPATH=${{ github.workspace }}" >> $GITHUB_ENV
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: install dependencies
        shell: bash
        env:
          GO111MODULE: on
        run: |
          echo "::group:: install dependencies"
          go install -v github.com/vbatts/git-validation@latest
          go install -v github.com/containerd/ltag@latest
          echo "::endgroup::"

      - name: DCO checker
        shell: bash
        working-directory: src/github.com/containerd/accelerated-container-image
        env:
          GITHUB_COMMIT_URL: ${{ github.event.pull_request.commits_url }}
          DCO_VERBOSITY: "-v"
          DCO_RANGE: ""
        run: |
          echo "::group:: DCO checks"
          set -eu -o pipefail
          if [ -z "${GITHUB_COMMIT_URL}" ]; then
          DCO_RANGE=$(jq -r '.after + "..HEAD"' ${GITHUB_EVENT_PATH})
          else
          DCO_RANGE=$(curl ${GITHUB_COMMIT_URL} | jq -r '.[0].parents[0].sha + "..HEAD"')
          fi

          range=
          [ ! -z "${DCO_RANGE}" ] && range="-range ${DCO_RANGE}"
          git-validation ${DCO_VERBOSITY} ${range} -run DCO,short-subject,dangling-whitespace
          echo "::endgroup::"

      - name: validate file headers
        shell: bash
        working-directory: src/github.com/containerd/accelerated-container-image
        run: |
          set -eu -o pipefail
          echo "::group:: file headers"
          ltag -t "script/validate/template" --excludes "vendor contrib" --check -v
          echo "::endgroup::"
